<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A2E37"/>
      <stop offset="1" stop-color="#15171C"/>
    </linearGradient>
  </defs>

  <!-- rounded-square "button" background -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>

  <!-- click ripples emanating from the tap point -->
  <g fill="none" stroke="#33C2FF" stroke-linecap="round">
    <path d="M196 150 A150 150 0 0 0 196 362" stroke-width="20" opacity="0.55"/>
    <path d="M156 120 A205 205 0 0 0 156 392" stroke-width="20" opacity="0.30"/>
  </g>

  <!-- finger tap pressing the button -->
  <g>
    <circle cx="300" cy="256" r="30" fill="#33C2FF"/>
    <path d="M300 256
             L300 196
             a26 26 0 0 1 52 0
             l0 92
             l40 14
             a30 30 0 0 1 20 28
             l0 44
             a40 40 0 0 1 -40 40
             l-70 0
             a44 44 0 0 1 -34 -16
             l-44 -54
             a26 26 0 0 1 38 -34
             l22 22
             Z"
          fill="#FFFFFF"/>
  </g>
</svg>
